name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Attach build artifacts to the matching tag release (requires the tag to exist on GitHub)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact: mac-dist
            paths: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            script: dist:win
            artifact: win-dist
            paths: |
              release/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (no publish)
        if: ${{ !(startsWith(github.ref, 'refs/tags/v') || inputs.publish == true) }}
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build & publish to GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish == true }}
        run: npm run ${{ matrix.script }} -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts (always, as a backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
