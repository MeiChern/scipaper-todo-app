name: Build & Release

on:
  pull_request:
    branches:
      - main
      - mac_adaptation
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Attach build artifacts to the matching tag release (requires the tag to exist on GitHub)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # required so GITHUB_TOKEN can create/update releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact: mac-dist
            paths: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            script: dist:win
            artifact: win-dist
            paths: |
              release/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (no publish)
        if: ${{ !(startsWith(github.ref, 'refs/tags/v') || inputs.publish == true) }}
        run: npm run ${{ matrix.script }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Prepare Apple API key
        if: ${{ matrix.os == 'macos-latest' && (startsWith(github.ref, 'refs/tags/v') || inputs.publish == true) }}
        shell: bash
        run: |
          node -e "require('fs').writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_API_KEY_BASE64 || '', 'base64'))" "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - name: Build & publish to GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish == true }}
        run: npm run ${{ matrix.script }} -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.MAC_CERTS || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CERTS_PASSWORD || '' }}
          APPLE_API_KEY: ${{ matrix.os == 'macos-latest' && format('{0}/AuthKey_{1}.p8', runner.temp, secrets.APPLE_API_KEY_ID) || '' }}
          APPLE_API_KEY_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}

      - name: Upload artifacts (always, as a backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
